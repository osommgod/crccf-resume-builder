services:
  - type: web
    name: crccf-resume-builder-backend
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: TIME_LIMIT_MINUTES
        value: 20
      - key: ADMIN_KEY
        value: admin123
      - key: MONGO_URI
        value: mongodb+srv://your-connection-string
      - key: CORS_ORIGIN
        value: https://resume-builder-7n8m.onrender.com
    healthCheckPath: /health
    autoDeploy: true
    
databases:
  - name: crccf-resume-db
    plan: free
